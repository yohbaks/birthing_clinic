{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block topbar_title %}Change Password{% endblock %}
{% block content %}
<div class="page-header"><div class="page-header-left"><div class="page-title">Change Password</div><div class="page-subtitle">Update your account password</div></div></div>
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="panel">
      <div class="panel-header"><div class="panel-icon" style="background:rgba(139,92,246,.1);color:#8B5CF6;"><i class="bi bi-shield-lock"></i></div><h5>Update Password</h5></div>
      <div class="panel-body">
        <form method="post">{% csrf_token %}
          <div class="mb-3"><label class="form-label">Current Password *</label><input type="password" name="old_password" class="form-control" required autofocus></div>
          <div class="mb-3"><label class="form-label">New Password *</label><input type="password" name="new_password" class="form-control" minlength="8" required><div style="font-size:11px;color:#94A3B8;margin-top:4px;">Minimum 8 characters</div></div>
          <div class="mb-4"><label class="form-label">Confirm New Password *</label><input type="password" name="confirm_password" class="form-control" required></div>
          <button type="submit" class="btn-rose w-100" style="justify-content:center;padding:12px;"><i class="bi bi-shield-check"></i> Change Password</button>
          <a href="{% url 'my_profile' %}" class="btn-outline-rose w-100 mt-2" style="justify-content:center;">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
