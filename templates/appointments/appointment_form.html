{% extends 'base.html' %}
{% block title %}Appointment Form{% endblock %}
{% block topbar_title %}Appointment{% endblock %}
{% block content %}
<div class="page-header"><div class="page-header-left"><div class="page-title">{% if appt %}Edit{% else %}New{% endif %} Appointment</div></div></div>
<form method="post">
{% csrf_token %}
<div class="row g-3">
  <div class="col-lg-7">
    <div class="panel">
      <div class="panel-header"><div class="panel-icon"><i class="bi bi-calendar-check"></i></div><h5>Appointment Details</h5></div>
      <div class="panel-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Patient *</label>
            <select name="patient" class="form-select" required>
              <option value="">Select Patient</option>
              {% for p in patients %}<option value="{{ p.pk }}" {% if appt.patient.pk == p.pk or request.GET.patient == p.pk|stringformat:"i" %}selected{% endif %}>{{ p.full_name }} ({{ p.record_number }})</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">Date *</label><input type="date" name="date" class="form-control" value="{{ appt.date|date:'Y-m-d'|default:'' }}" required></div>
          <div class="col-md-6"><label class="form-label">Time *</label><input type="time" name="time" class="form-control" value="{{ appt.time|time:'H:i'|default:'' }}" required></div>
          <div class="col-md-6">
            <label class="form-label">Appointment Type</label>
            <select name="appointment_type" class="form-select">
              <option value="prenatal">Prenatal Checkup</option>
              <option value="postpartum">Postpartum</option>
              <option value="consultation">Consultation</option>
              <option value="lab">Lab Work</option>
              <option value="ultrasound">Ultrasound</option>
              <option value="follow_up">Follow-up</option>
              <option value="walk_in">Walk-in</option>
            </select>
          </div>
          {% if appt %}
          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
              <option value="pending" {% if appt.status == "pending" %}selected{% endif %}>Pending</option>
              <option value="confirmed" {% if appt.status == "confirmed" %}selected{% endif %}>Confirmed</option>
              <option value="completed" {% if appt.status == "completed" %}selected{% endif %}>Completed</option>
              <option value="cancelled" {% if appt.status == "cancelled" %}selected{% endif %}>Cancelled</option>
              <option value="no_show" {% if appt.status == "no_show" %}selected{% endif %}>No Show</option>
            </select>
          </div>
          {% endif %}
          <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="3">{{ appt.notes|default:"" }}</textarea></div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="panel">
      <div class="panel-body">
        <button type="submit" class="btn-rose w-100" style="justify-content:center;padding:12px;"><i class="bi bi-check-circle"></i> Save Appointment</button>
        <a href="{% url 'appointment_list' %}" class="btn-outline-rose w-100 mt-2" style="justify-content:center;">Cancel</a>
      </div>
    </div>
  </div>
</div>
</form>
{% endblock %}
