{% extends 'base.html' %}
{% block title %}Stock In{% endblock %}
{% block topbar_title %}Stock In{% endblock %}
{% block content %}
<div class="page-header"><div class="page-header-left"><div class="page-title">Record Stock In</div><div class="page-subtitle">Add new inventory stock</div></div></div>
<form method="post">
{% csrf_token %}
<div class="row g-3">
  <div class="col-lg-6">
    <div class="panel">
      <div class="panel-header"><div class="panel-icon" style="background:rgba(16,185,129,.1);color:#10B981;"><i class="bi bi-arrow-down-circle"></i></div><h5>Stock In Details</h5></div>
      <div class="panel-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Item *</label>
            <select name="item" class="form-select" required>
              <option value="">Select Item</option>
              {% for i in items %}<option value="{{ i.pk }}">{{ i.name }} ({{ i.item_code }}) | {{ i.quantity_on_hand }} {{ i.get_unit_display }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">Quantity *</label><input type="number" name="quantity" step="0.01" class="form-control" required min="0.01"></div>
          <div class="col-md-6"><label class="form-label">Reference / PO No.</label><input type="text" name="reference" class="form-control" placeholder="PO number, supplier invoice..."></div>
          <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
          <div class="col-12"><button type="submit" class="btn-teal w-100" style="justify-content:center;padding:12px;"><i class="bi bi-arrow-down-circle"></i> Record Stock In</button></div>
        </div>
      </div>
    </div>
  </div>
</div>
</form>
{% endblock %}
